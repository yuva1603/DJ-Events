<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>ZONO Events | Premium DJ & Event Production</title>
    <meta name="description" content="ZONO Events — premium DJ event production and immersive live experiences. From intimate rooftops to festival stages, we create moments that move you. Book now." />
    <meta name="keywords" content="DJ events, event production, festival, music, booking, live DJ, sound systems, laser show" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://zonoevents.com" />

    <!-- Open Graph -->
    <meta property="og:title" content="ZONO Events | Premium DJ & Event Production" />
    <meta property="og:description" content="We don't play music. We create moments. Book your next unforgettable event." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://zonoevents.com" />
    <meta property="og:image" content="https://zonoevents.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ZONO Events | Premium DJ & Event Production" />
    <meta name="twitter:description" content="We don't play music. We create moments." />
    <meta name="twitter:image" content="https://zonoevents.com/og-image.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "ZONO Events",
      "description": "Premium DJ event production and immersive live experiences",
      "url": "https://zonoevents.com",
      "telephone": "+1-800-ZONO-DJ",
      "email": "hello@zonoevents.com",
      "sameAs": [
        "https://instagram.com/zonoevents",
        "https://tiktok.com/@zonoevents",
        "https://facebook.com/zonoevents"
      ],
      "offers": {
        "@type": "Offer",
        "description": "DJ and live event production packages"
      }
    }
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Preload critical fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
